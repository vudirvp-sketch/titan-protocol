# TITAN Protocol Deprecations Registry
# Tracks deprecated features and migration paths

deprecations:
  - feature: "assemble_protocol.sh"
    deprecated_in: "4.0.0"
    removed_in: "5.0.0"
    replacement: "titan assemble"
    migration_guide: "docs/migration/assemble_protocol.md"

  - feature: "pickle checkpoints"
    deprecated_in: "3.2.0"
    removed_in: "4.0.0"
    replacement: "JSON+zstd checkpoints"
    migration_guide: "docs/migration/checkpoints.md"

  - feature: "VM2 sandbox"
    deprecated_in: "4.0.0"
    removed_in: "5.0.0"
    replacement: "WASM/gVisor sandbox"
    migration_guide: "docs/migration/sandbox.md"

  - feature: "legacy config format"
    deprecated_in: "4.0.0"
    removed_in: "4.2.0"
    replacement: "YAML config with schema validation"
    migration_guide: "docs/migration/config.md"

  - feature: "titan-doctor --legacy"
    deprecated_in: "4.1.0"
    removed_in: "5.0.0"
    replacement: "titan doctor --rules"
    migration_guide: "docs/migration/doctor.md"

# Deprecation policy
policy:
  min_versions_before_removal: 2

  levels:
    - version_gap: 1
      severity: "warning"
    - version_gap: 2
      severity: "error"
    - version_gap: 3
      severity: "blocked"

  auto_migrate:
    enabled: true
    safe_features:
      - "legacy config format"
      - "titan-doctor --legacy"
