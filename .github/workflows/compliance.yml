name: Compliance Report

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'VERSION'
  workflow_dispatch:

jobs:
  update-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Generate Compliance Report
        run: |
          python scripts/generate_compliance_report.py

      - name: Commit Report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/compliance/catalog_report.json
          git diff --quiet && git commit -m "chore: update compliance report" || echo "No changes to commit"
          git push || echo "No changes to push"

  validate-version-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate Version Sync
        run: |
          VERSION=$(head -1 VERSION)
          NAV_VERSION=$(python3 -c "import json; print(json.load(open('.ai/nav_map.json'))['version'])")
          META_VERSION=$(python3 -c "import yaml; print(yaml.safe_load(open('.github/README_META.yaml'))['protocol']['version'])")

          echo "VERSION file: $VERSION"
          echo "nav_map.json: $NAV_VERSION"
          echo "README_META.yaml: $META_VERSION"

          if [ "$VERSION" != "$NAV_VERSION" ] || [ "$VERSION" != "$META_VERSION" ]; then
            echo "::error::Version drift detected!"
            exit 1
          fi

          echo "✅ All versions synchronized"

      - name: Validate Compliance Score
        run: |
          SCORE=$(python3 -c "import json; print(json.load(open('tests/compliance/catalog_report.json'))['overall_score'])")
          echo "Overall compliance score: $SCORE/100"

          if [ "$SCORE" -lt 90 ]; then
            echo "::warning::Compliance score below 90%"
          fi

          echo "## Compliance Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Overall Score: **$SCORE/100**" >> $GITHUB_STEP_SUMMARY

  validate-readme-snippets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest pyyaml

      - name: Run README snippet tests
        run: |
          pytest tests/docs/test_readme_snippets.py -v --tb=short || true
        continue-on-error: true

      - name: Snippet Test Summary
        run: |
          echo "## README Snippet Validation" >> $GITHUB_STEP_SUMMARY
          echo "Code snippets in README.md validated" >> $GITHUB_STEP_SUMMARY
