name: Version Sync Check

on:
  push:
    paths:
      - 'VERSION'
      - '.ai/nav_map.json'
      - '.github/README_META.yaml'
      - 'README.md'
      - 'SKILL.md'
      - 'config.yaml'
  pull_request:
    paths:
      - 'VERSION'
      - '.ai/nav_map.json'
      - '.github/README_META.yaml'
      - 'README.md'
      - 'SKILL.md'
      - 'config.yaml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run comprehensive version sync check
        id: sync_check
        run: |
          python scripts/sync_versions.py --check --report --json > sync_report.json 2>&1 || true
          
          # Extract status
          if python scripts/sync_versions.py --check 2>/dev/null; then
            echo "status=synced" >> $GITHUB_OUTPUT
          else
            echo "status=drift" >> $GITHUB_OUTPUT
          fi
          
          # Generate summary
          echo "### Version Sync Report" >> $GITHUB_STEP_SUMMARY
          if [ -f sync_report.json ]; then
            cat sync_report.json | python3 -c "
import sys, json
data = json.load(sys.stdin)
print(f\"- **SSOT Version**: v{data.get('ssot_version', 'unknown')}\")
print(f\"- **Sources Checked**: {data.get('sources_checked', 0)}\")
print(f\"- **Mismatches**: {data.get('mismatches_count', 0)}\")
if data.get('mismatches'):
    print('\n#### Mismatches:')
    for m in data['mismatches']:
        print(f\"- {m['source']}: v{m.get('actual', 'N/A')} → v{m['expected']}\")
" >> $GITHUB_STEP_SUMMARY || true
          fi

      - name: Validate version format
        run: |
          VERSION=$(head -1 VERSION)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            echo "Expected semantic version (e.g., 5.0.0)"
            exit 1
          fi
          echo "✅ Version format is valid: $VERSION"

      - name: Fail on drift
        if: steps.sync_check.outputs.status == 'drift'
        run: |
          echo "❌ Version drift detected. Please run: python scripts/sync_versions.py --fix"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ❌ Action Required" >> $GITHUB_STEP_SUMMARY
          echo "Run \`python scripts/sync_versions.py --fix\` to synchronize all versions." >> $GITHUB_STEP_SUMMARY
          exit 1

      - name: Success
        if: steps.sync_check.outputs.status == 'synced'
        run: |
          echo "✅ All versions are synchronized"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Version Sync Validated" >> $GITHUB_STEP_SUMMARY
          VERSION=$(head -1 VERSION)
          echo "All sources are synchronized to version \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
