schema_version: "1.1.0"
description: "Registry of all recognized gap types in TITAN Protocol v5.3.0"

categories:
  - id: STRUCT
    name: "Structural Gap"
    description: "Missing or incomplete structural elements"
  - id: BEHAV
    name: "Behavioral Gap"
    description: "Missing or incorrect runtime behavior"
  - id: VAL
    name: "Validation Gap"
    description: "Missing validation logic or cases"
  - id: ADAPT
    name: "Adaptation Gap"
    description: "Missing adaptation rules or matrix entries"
  - id: INTEG
    name: "Integration Gap"
    description: "Missing integration between components"
  - id: PAT
    name: "Pattern Gap"
    description: "Pattern-specific gaps (v5.3.0)"
  - id: DOCS
    name: "Documentation Gap"
    description: "Documentation synchronization issues (v5.3.0)"

gap_types:
  - gap_id: "GAP-STRUCT-001"
    category: STRUCT
    description: "Missing structural pattern definition"
    severity: BLOCK
    related_patterns: ["PAT-01"]
  - gap_id: "GAP-STRUCT-002"
    category: STRUCT
    description: "Missing atomic item field"
    severity: WARN
    related_patterns: ["PAT-01"]
  - gap_id: "GAP-STRUCT-003"
    category: STRUCT
    description: "Workspace isolation boundary violation"
    severity: BLOCK
    related_patterns: ["PAT-38"]
  - gap_id: "GAP-STRUCT-004"
    category: STRUCT
    description: "Schema migration required"
    severity: WARN
    related_patterns: []
