# Adapter implementation templates
adapter_templates:
  MISSING_DATA:
    handler_class: "src.events.gap_event.MissingDataAdapter"
    default_config:
      max_retries: 3
      retry_delay_ms: 1000
      request_user_input: true
      
  INVALID_FORMAT:
    handler_class: "src.events.gap_event.InvalidFormatAdapter"
    default_config:
      max_retries: 2
      auto_suggest: true
      fallback_parser: null
      
  CONSTRAINT_VIOLATION:
    handler_class: "src.events.gap_event.ConstraintViolationAdapter"
    default_config:
      block_on_sev1: true
      log_level: ERROR
      notify_admin: true
      
  PROCESSING_ERROR:
    handler_class: "src.events.gap_event.ProcessingErrorAdapter"
    default_config:
      max_retries: 3
      exponential_backoff: true
      fallback_strategy: abort

# Metrics configuration
metrics:
  enabled: true
  track_by_pattern: true
  track_by_source: true
  report_interval_seconds: 60
