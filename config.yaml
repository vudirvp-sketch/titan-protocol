session:
  id: null
  max_tokens: 100000
  max_time_minutes: 60
  checkpoint_enabled: true
chunking:
  default_size: 1500
  large_file_size: 800
  min_size: 500
  semantic_boundaries: true
  boundary_markers:
  - '^#{1,6} '
  - '^function '
  - '^def '
  - '^class '
  - ^---$
  - ^```
llm_query:
  max_response_tokens: 2048
  max_chunk_tokens: 4000
  fallback_enabled: true
  fallback:
    max_attempts: 4
    size_reduction_factor: 0.5
    timeout_seconds: 30
    model_fallback: true
    models:
    - primary
    - alternative-1
validation:
  max_patch_iterations: 2
  parallel_safe_check: true
  gate_04:
    max_sev1_gaps: 0
    max_sev2_gaps: 2
    max_total_gap_pct: 20
checkpoint:
  enabled: true
  format_version: '2.0'
  chunk_checksums: true
  partial_resumption: true
  max_age_days: 30
  path: checkpoints/checkpoint.json
  interval_tokens: 5000
  interval_seconds: 60
  compression: none
  security: safe
output:
  directory: outputs/
  clean_mode: true
  full_merge: true
  full_merge_max_lines: 8000
  artifacts:
    index: true
    symbol_map: true
    change_log: true
    decision_record: false
    metrics: true
multi_file:
  default_limit: 3
  hard_limit: 10
  require_approval: true
  dependency_resolution: true
  max_dependency_depth: 5
  cross_file_patches: false
approval:
  mode: interactive
  callback:
    url: null
    timeout: 300
    retries: 3
metrics:
  enabled: true
  output_file: outputs/metrics.json
  prometheus:
    enabled: false
    port: 9090
  webhook:
    enabled: false
    url: null
    events:
    - session_complete
    - session_failed
    - gate_blocked
validators:
  auto_load: true
  timeout: 10
  disabled: []
logging:
  level: info
  file: null
  timestamps: true
  include_session_id: true
repository:
  directories:
  - inputs
  - outputs
  - checkpoints
  - skills
  - scripts
  - examples
  required_files:
  - PROTOCOL.md
  - SKILL.md
  - README.md
  - VERSION
development:
  debug: false
  keep_intermediates: false
  dry_run: true  # FIXED: Default to true for safety (R-04 mitigation)
  verbose: false
security:
  execution_mode: trusted
  sandbox_type: none
  permitted_operations:
  - file_read
  - file_write
  - grep
  - sed
  blocked_operations:
  - rm_rf
  - sudo
  - chmod
  - chown
  max_input_file_size_mb: 100
  max_total_input_size_mb: 500
  secrets_scan: false
  workspace_path: null
  redos_timeout_ms: 1000
chunking_limits:
  max_chars_per_chunk: 150000
  max_tokens_per_chunk: 30000
  enforce_secondary_limits: true
policy:
  max_recursion_depth: 3

recursion:
  max_recursion_depth: 3
  track_peak: true
model_routing:
  root_model: ''  # REQUIRED: Set to your orchestration model ID
  leaf_model: ''  # REQUIRED: Set to your chunk processing model ID
  track_costs: true
  log_model_usage: true
  # FIXED: Validation added at startup (see src/cli/titan_cli.py)
  validation:
    require_root_model: false  # Set true to enforce model configuration
    require_leaf_model: false
    warn_on_empty: true
confidence:
  enable_advisory: true
  early_exit_threshold: HIGH
  require_acknowledgement: true
  log_confidence: true
telemetry:
  enable_token_tracking: true
  calculate_percentiles: true
  track_latency: true
  include_model_breakdown: true
mode:
  current: direct
  presets_dir: presets/
intent_classifier:
  enabled: false
  method: rule_based
  confidence_threshold: 0.7
  log_all: true
anomaly_detection:
  enabled: false
  baseline_sessions: 10
  threshold_multiplier: 3
  action: warn
model_fallback:
  enabled: false
  chain:
  - secondary-frontier
  - local-high-end
  degradation_mode: reduced_capability
