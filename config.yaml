session:
  id: null
  max_tokens: 100000
  max_time_minutes: 60
  checkpoint_enabled: true
chunking:
  default_size: 1500
  large_file_size: 800
  min_size: 500
  semantic_boundaries: true
  boundary_markers:
  - '^#{1,6} '
  - '^function '
  - '^def '
  - '^class '
  - ^---$
  - ^```
  # ITEM-FEAT-91: Auto-split on Chunk Limit
  primary_limit: 50000  # chars
  secondary_limit: 150000  # Force resplit above this
  auto_split_on_limit: true
  auto_split:
    enabled: true
    max_recursion_depth: 3
    preserve_boundaries: true
    boundary_types:
      - "heading"
      - "function"
      - "class"
      - "paragraph"
llm_query:
  max_response_tokens: 2048
  max_chunk_tokens: 4000
  fallback_enabled: true
  fallback:
    max_attempts: 4
    size_reduction_factor: 0.5
    timeout_seconds: 30
    model_fallback: true
    models:
    - primary
    - alternative-1
validation:
  max_patch_iterations: 2
  parallel_safe_check: true
  gate_04:
    max_sev1_gaps: 0
    max_sev2_gaps: 2
    max_total_gap_pct: 20
checkpoint:
  enabled: true
  format_version: '2.0'
  chunk_checksums: true
  partial_resumption: true
  max_age_days: 30
  path: checkpoints/checkpoint.json
  interval_tokens: 5000
  interval_seconds: 60
  # ITEM-073: Default serialization format
  serialization: json_zstd
  compression: zstd
  security: safe
  # ITEM-SEC-03: Checkpoint encryption
  encryption: aes-256-gcm
  encryption_key_path: .titan/encryption_key
  # ITEM-STOR-02: Checkpoint session isolation
  namespace_isolation: true
  namespace: default
  auto_cleanup: true
  cleanup_interval_days: 7
  # ITEM-FEAT-72: Checkpoint compression with deduplication
  compression:
    enabled: true
    algorithm: "zstd"  # gzip | zstd | lz4
    level: 3  # 1-9 for gzip, 1-22 for zstd
    deduplication: true
    min_size_for_dedup: 1024  # bytes
    pattern_min_length: 50  # chars
output:
  directory: outputs/
  clean_mode: true
  full_merge: true
  full_merge_max_lines: 8000
  artifacts:
    index: true
    symbol_map: true
    change_log: true
    decision_record: true  # ITEM-ART-002: Enable decision record generation
    metrics: true

# ITEM-ART-002: Decision Record Configuration
decision_record:
  enabled: true
  require_for_delivery: true  # Block DELIVERY if empty (ARTIFACT_CONTRACT enforcement)
  include_in_metrics: true
  output_path: outputs/decision_record.json
multi_file:
  default_limit: 3
  hard_limit: 10
  require_approval: true
  dependency_resolution: true
  max_dependency_depth: 5
  cross_file_patches: false
approval:
  mode: interactive
  callback:
    url: null
    timeout: 300
    retries: 3
metrics:
  enabled: true
  output_file: outputs/metrics.json
  # ITEM-OBS-03: Schema versioning
  schema_version: "3.4.0"
  migration_enabled: true
  prometheus:
    enabled: false
    port: 9090
  webhook:
    enabled: false
    url: null
    events:
    - session_complete
    - session_failed
    - gate_blocked
validators:
  auto_load: true
  timeout: 10
  disabled: []
  # ITEM-070: Sandbox for validators
  sandbox_enabled: true
  # ITEM-SEC-01: Sandbox type selection
  sandbox_type: subprocess  # Options: wasm, gvisor, subprocess, none
  sandbox_config:
    memory_limit_mb: 128
    timeout_ms: 10000
    max_output_size: 1048576
logging:
  level: info
  file: null
  timestamps: true
  include_session_id: true
repository:
  directories:
  - inputs
  - outputs
  - checkpoints
  - skills
  - scripts
  - examples
  required_files:
  - PROTOCOL.md
  - SKILL.md
  - README.md
  - VERSION
development:
  debug: false
  keep_intermediates: false
  dry_run: true  # FIXED: Default to true for safety (R-04 mitigation)
  verbose: false
security:
  execution_mode: trusted
  sandbox_type: none
  permitted_operations:
  - file_read
  - file_write
  - grep
  - sed
  blocked_operations:
  - rm_rf
  - sudo
  - chmod
  - chown
  max_input_file_size_mb: 100
  max_total_input_size_mb: 500
  # ITEM-115: Enable secret scanning
  secrets_scan: true
  secrets_baseline: .secrets.baseline
  fail_on_detection: true
  workspace_path: null
  redos_timeout_ms: 1000

# ITEM-SEC-03: Secret store configuration
secrets:
  backend: env  # Options: keyring, vault, env
  # Backend-specific config:
  # keyring:
  #   service_name: titan-protocol
  # vault:
  #   url: http://localhost:8200
  #   token: null  # Use VAULT_TOKEN env
  #   mount_point: secret
  # env:
  prefix: TITAN_SECRET_

# ITEM-SEC-05: Audit trail configuration
# ITEM-ART-001: Enhanced audit signing with multiple backends
audit:
  enabled: true
  backend: hmac  # Options: hmac | rsa | kms | ed25519
  hmac:
    secret_path: .titan/hmac_secret
  rsa:
    private_key_path: .titan/audit_private.pem
    public_key_path: .titan/audit_public.pem
  kms:
    endpoint: null
    key_id: null
    api_key: null
  ed25519:
    key_path: .titan/audit_key
  sign_critical_events: true
  trail_path: .titan/audit_trail.json
  # Key rotation settings
  key_rotation:
    enabled: false
    interval_days: 90
    warn_before_days: 7

chunking_limits:
  max_chars_per_chunk: 150000
  max_tokens_per_chunk: 30000
  enforce_secondary_limits: true
policy:
  max_recursion_depth: 3
  # v3.6.0: ITEM-POLICY-01: PolicyResolver
  resolver:
    enabled: true
    strict_mode: false  # Block on conflicts if true
    allowed_conflict_severities:
      - "WARN"
      - "INFO"
    auto_resolve: false  # Auto-resolve trivial conflicts

# ITEM-ARCH-10: PolicyStagingZone
staging_zone:
  min_confidence: 0.6  # Minimum confidence to commit a staged policy
  max_staged: 100  # Maximum number of staged policies
  ttl_seconds: 3600  # Time-to-live for staged policies (1 hour)
  cleanup_interval_seconds: 300  # Automatic cleanup interval (5 minutes)

recursion:
  max_recursion_depth: 3
  track_peak: true
model_routing:
  root_model: ''  # REQUIRED: Set to your orchestration model ID
  leaf_model: ''  # REQUIRED: Set to your chunk processing model ID
  track_costs: true
  log_model_usage: true
  # FIXED: Validation added at startup (see src/cli/titan_cli.py)
  validation:
    require_root_model: false  # Set true to enforce model configuration
    require_leaf_model: false
    warn_on_empty: true
  
  # ITEM-MODEL-001: Routing optimization
  complexity_weights:
    context_length: 0.3
    dependency_depth: 0.2
    gate_count: 0.2
    pattern_complexity: 0.3
  
  tier_demotion:
    enabled: true
    low_complexity_threshold: 0.3
    high_complexity_threshold: 0.7
    high_confidence_threshold: 0.9
confidence:
  enable_advisory: true
  early_exit_threshold: HIGH
  require_acknowledgement: true
  log_confidence: true
telemetry:
  enable_token_tracking: true
  calculate_percentiles: true
  track_latency: true
  include_model_breakdown: true
mode:
  current: direct
  presets_dir: presets/
  # [ITEM-GATE-001] Execution mode profiles for gate behavior
  profiles:
    ci_cd_pipeline:
      strict_mode: true
      fail_fast: true
      sensitivity_multiplier: 0.8
      retry_generous: false
      consensus_required: false
      max_retries: 1
      description: "Production CI/CD - strictest settings"
    single_llm_executor:
      strict_mode: false
      fail_fast: false
      sensitivity_multiplier: 1.0
      retry_generous: true
      consensus_required: false
      max_retries: 5
      description: "Single LLM - balanced settings"
    multi_agent_swarm:
      strict_mode: true
      fail_fast: false
      sensitivity_multiplier: 0.9
      retry_generous: false
      consensus_required: true
      max_retries: 3
      description: "Multi-agent - consensus-based"
    deterministic:
      strict_mode: true
      fail_fast: true
      sensitivity_multiplier: 0.85
      retry_generous: false
      consensus_required: false
      max_retries: 2
      description: "Deterministic - production/critical"
    guided_autonomy:
      strict_mode: false
      fail_fast: false
      sensitivity_multiplier: 1.0
      retry_generous: true
      consensus_required: false
      max_retries: 4
      description: "Guided autonomy - assisted operations"
    fast_prototype:
      strict_mode: false
      fail_fast: false
      sensitivity_multiplier: 1.2
      retry_generous: true
      consensus_required: false
      max_retries: 10
      description: "Fast prototype - rapid iteration"
    direct:
      strict_mode: false
      fail_fast: false
      sensitivity_multiplier: 1.0
      retry_generous: false
      consensus_required: false
      max_retries: 3
      description: "Direct - default mode"
intent_classifier:
  enabled: false
  method: rule_based
  confidence_threshold: 0.7
  log_all: true
anomaly_detection:
  enabled: false
  baseline_sessions: 10
  threshold_multiplier: 3
  action: warn
model_fallback:
  enabled: false
  chain:
  - secondary-frontier
  - local-high-end
  degradation_mode: reduced_capability

# ITEM-GATE-05: Model downgrade control
model_downgrade_allowed: false  # Only true for fast_prototype mode

# ITEM-ARCH-02: Event Journal for crash recovery
event_journal:
  enabled: true
  path: .titan/event_journal.jsonl
  max_size_mb: 100

# ITEM-CONFLICT-J: EventBus Wildcard Performance
events:
  wildcard_warning_threshold: 10
  max_wildcard_handlers: 50
  # v3.6.0: ITEM-RESILIENCE-01: Dead Letter Queue
  dead_letter_queue:
    enabled: true
    max_size: 10000
    persistence: true
    storage_backend: "local"  # local | s3 | gcs
    retry_policy:
      max_retries: 3
      base_delay_ms: 1000
      exponential_backoff: true
    cleanup:
      max_age_hours: 72
      auto_purge: true
  sync_operations:
    default_timeout_ms: 5000
    max_timeout_ms: 30000

# ITEM-ARCH-03: Distributed Locking
locks:
  backend: file  # Options: file, redis, etcd
  lock_dir: .titan/locks
  # Redis backend config:
  redis:
    host: localhost
    port: 6379
    db: 0
    password: null
    key_prefix: "titan:lock:"
  # etcd backend config:
  etcd:
    host: localhost
    port: 2379
    key_prefix: "/titan/lock/"

# ITEM-ARCH-04: Gate-04 severity-based blocking
gate04:
  confidence_override: false  # HIGH confidence cannot override SEV-1/SEV-2
  max_sev2_gaps: 0  # Any unresolved SEV-2 blocks
  allow_advisory_pass: true  # Allow advisory pass for SEV-3/SEV-4

# ITEM-ARCH-07: Approval Loop configuration  
approval:
  release_locks_on_wait: true
  lock_ttl_seconds: 300
  force_resume_allowed: false  # Security: require cursor validation

# ITEM-GATE-02: Mode-based gate sensitivity
gate_sensitivity:
  deterministic:
    fail_on_any_gap: true
    warn_threshold_pct: 5
    max_sev1_gaps: 0
    max_sev2_gaps: 0
    max_sev3_gaps: 0
    max_sev4_gaps: 0
    allow_advisory_pass: false
    allow_unsafe: false
    confidence_override: false
  guided_autonomy:
    fail_on_any_gap: false
    warn_threshold_pct: 15
    max_sev1_gaps: 0
    max_sev2_gaps: 2
    max_sev3_gaps: 5
    max_sev4_gaps: 10
    allow_advisory_pass: true
    allow_unsafe: false
    confidence_override: true
  fast_prototype:
    fail_on_any_gap: false
    warn_threshold_pct: 30
    max_sev1_gaps: 0
    max_sev2_gaps: 5
    max_sev3_gaps: 10
    max_sev4_gaps: 20
    allow_advisory_pass: true
    allow_unsafe: true
    confidence_override: true

# ITEM-GATE-03: Pre-intent token budget
pre_intent:
  token_limit: 5000
  fallback_mode: MANUAL
  ambiguity_threshold: 0.5

# ITEM-STOR-01: Storage Backend Configuration
storage:
  backend: local  # Options: local, s3, gcs
  namespace: default  # Namespace for path isolation
  # Local filesystem configuration
  local:
    base_path: .titan/storage
    create_dirs: true
  # AWS S3 configuration (optional)
  s3:
    bucket: null  # Required if backend is s3
    prefix: titan
    region: us-east-1
    credentials:
      access_key: null  # Use AWS_ACCESS_KEY_ID env var
      secret_key: null  # Use AWS_SECRET_ACCESS_KEY env var
      session_token: null
    endpoint_url: null  # For S3-compatible services
  # Google Cloud Storage configuration (optional)
  gcs:
    bucket: null  # Required if backend is gcs
    prefix: titan
    project: null  # GCP project ID
    credentials_path: null  # Path to service account JSON

# ========================================
# v3.4.0 Configuration Additions
# ========================================

# ITEM-ARCH-09: Causal Event Ordering
causal_ordering:
  enabled: true
  node_id: null  # Auto-generated if null
  known_nodes: []  # List of known node IDs for vector clock

# ITEM-ARCH-15: Model Version Fingerprint
llm:
  strict_version_check: false  # Raise error on model version mismatch in deterministic mode
  version_tracking:
    enabled: true
    warn_only: false  # If true, just warn instead of blocking on mismatch

# ITEM-ARCH-19: Semantic Tainting
tainting:
  enabled: true
  confidence_threshold: 0.8  # Below this, data is auto-tainted

# ITEM-CFG-04: Runtime Config Overlay
runtime_overlay:
  enabled: true
  export_on_exit: true
  export_path: outputs/evals.jsonl

# ITEM-CFG-05: Manifest Cache Invalidation
manifest:
  cache_ttl_seconds: 300  # TTL for idle cache entries
  max_cache_entries: 100

# ITEM-CONFLICT-C: Chunk Size Bidirectional Optimization
chunking_optimization:
  min_chunk_size: 1000
  max_chunk_size: 50000
  shrink_threshold: 30000  # Files larger get smaller chunks
  grow_threshold: 5000  # Files smaller get larger chunks

# ITEM-CONFLICT-F: Model Fallback Trigger Conditions
model_fallback_triggers:
  timeout_ms: 30000
  error_rate_threshold: 0.1  # 10% errors in window
  error_rate_window_seconds: 60
  token_limit_exceeded: true

# ITEM-CONFLICT-K: Checksum Prefix Collision
checksum:
  prefix_length: 16  # For local/dev
  production_min_length: 32  # Required in production

# ITEM-CONFLICT-L: GraphViz Optional Dependency
visualization:
  mode: "ascii_only"  # "ascii_only" | "full"
  graphviz_path: null  # Optional path to dot

# ITEM-STOR-04: Log Rotation
logging_rotation:
  enabled: true
  max_size_mb: 100
  keep_count: 10
  compress: true
  max_age_days: 30

# ITEM-OBS-01: Prometheus Metrics Endpoint (extended)
prometheus:
  enabled: true
  port: 9090
  path: /metrics

# ITEM-FEAT-55: IntentRouter Plugin Registry
intent_router:
  plugins: []
  # Example plugin configuration:
  # - name: "code_audit"
  #   handler: "src.plugins.code_audit:handle"
  #   chain: ["security_scan", "style_check"]
  #   priority: 8
  # - name: "spec_generation"
  #   handler: "src.plugins.spec_gen:handle"
  #   chain: ["reference_collector", "doc_generator"]

# ITEM-FEAT-111: DAG Checkpointing
dag_checkpoint:
  enabled: true
  checkpoint_dir: .titan/dag_checkpoints
  max_snapshots: 100

# ========================================
# v3.5.1 Configuration Additions (Phase 14)
# ========================================

# ITEM-CAT-01: Adaptive Weight Profiles Engine
scoring:
  adaptive_weights:
    enabled: true
    default_profile: "mixed"  # Options: technical, medical_legal, narrative, mixed
    override_by_intent: true  # Allow intent_router to override profile
  thresholds:
    clear_winner: 2.0  # Gap for auto-select without rationale
    needs_rationale: 1.0  # Gap for one-sentence explanation
    conditional: 0.0  # Below this → conditional recommendation

# ITEM-CAT-02: SCOUT Roles Matrix Agent Framework
scout:
  roles:
    radar:
      enabled: true
      min_signal_threshold: 0.3
    devil:
      enabled: true
      mandatory_for: ["EVALUATE", "COMPARE", "VALIDATE", "AUDIT"]
    eval:
      enabled: true
      veto_enabled: true
      veto_on: ["EXPERIMENTAL", "VAPORWARE"]
    strat:
      enabled: true
      require_caveat_for: ["EXPERIMENTAL", "EARLY_ADOPTER"]
  pipeline:
    enforce_order: ["RADAR", "DEVIL", "EVAL", "STRAT"]
    allow_parallel: false  # Veto propagation requires sequential

# ITEM-CAT-03: Type-Aware Fusion Engine
fusion:
  type_aware:
    enabled: true
    strict_type_merge: true  # Block cross-type merges
    low_density_policy: "unique_context_or_caveat"  # Options: always, unique_context_or_caveat, never
  density:
    high_priority_multiplier: 1.5  # Boost HIGH_DENSITY in scoring
    low_density_threshold: 0.3  # Min relevance score to include LOW_DENSITY

# ITEM-CAT-04: Conflict Resolution Formula Engine
decision:
  conflict_resolution:
    enabled: true
    formula_weights:
      accuracy: 0.40
      utility: 0.35
      efficiency: 0.15
      consensus: 0.10
    thresholds:
      clear_winner: 2.0  # Auto-select, no rationale
      needs_rationale: 1.0  # Winner + one-sentence
      conditional: 0.0  # Below this → conditional recommendation
    override_by_domain: true  # Allow domain_profile to adjust weights

# ITEM-VAL-GUARDIAN: Guardian Validation Loop
guardian:
  enabled: true
  default_profile: "mixed"
  validation_mode: "standard"  # Options: strict, standard, permissive
  log_decisions: true
  conflict_detection: true
  auto_resolve: true

# ========================================
# v3.6.0 Configuration Additions (Phase 15-17)
# ========================================

# ITEM-FEEDBACK-01: FeedbackLoop
feedback:
  enabled: true
  min_samples_for_adjustment: 50
  adjustment_threshold: 0.05  # Minimum change to trigger
  max_allowed_degradation: 0.05  # 5%
  learning_rate: 0.1
  target_success_rate: 0.8
  catalog_versioning:
    enabled: true
    max_versions: 100
    retention_days: 365
  dry_run:
    enabled: true
    history_window_days: 30

# ITEM-FEEDBACK-02: SelfEvolutionEngine
evolution:
  enabled: true
  min_success_rate_for_pattern: 0.8
  min_sessions_for_pattern: 5
  auto_propose_skills: false  # Require human approval
  skill_draft_review: true

# ITEM-SKILL-01: SkillLibrary
skills:
  catalog_path: "skills/catalog.yaml"
  auto_register: true
  synergy_tracking: true
  min_applicable_to: 2  # Each skill applicable to >= 2 tasks
  validation:
    on_startup: true
    strict_mode: false

# ========================================
# v3.7.0 Configuration Additions (Phase 18)
# ========================================

# ITEM-ARCH-16: External State Drift Policy
state:
  drift_policy: "FAIL"  # FAIL | CLOBBER | MERGE | BRANCH
  drift_detection:
    enabled: true
    check_interval_seconds: 30
    on_drift:
      log_level: "WARN"
      emit_event: true
  merge_strategy:
    prefer: "local"  # local | external | newer
    conflict_resolution: "manual"  # manual | prefer_local | prefer_external

# ITEM-ARCH-18: Config Precedence Pyramid
config_precedence:
  log_overrides: true
  strict_mode: false  # Warn on conflicts if true
  sources:
    env_prefix: "TITAN_"
    cli_prefix: "--"
    constraints_file: "constraints.yaml"
    local_file: "config.yaml"

# ========================================
# v3.7.1 Configuration Additions (Phase 20)
# ========================================

# ITEM-OBS-05: Budget Forecasting
budget:
  forecasting:
    enabled: true
    warning_threshold: 0.9  # 90% of budget
    critical_threshold: 0.95
    history_window: 100
    recommended_actions:
      - "compact_context"
      - "switch_to_leaf_model"
      - "reduce_chunk_size"

# ITEM-OBS-04: Symbol Map OOM Protection
symbol_map:
  enabled: true
  max_entries: 100000
  max_memory_mb: 500
  eviction_batch_size: 1000
  eviction_policy: "lru"  # lru | lfu | fifo
  namespace_qualification: true

# ========================================
# v4.0.0 Configuration Additions (TIER_6)
# ========================================

# ITEM-OBS-06: Distributed Tracing Integration
# ITEM-OBS-001: OpenTelemetry Traces Enhancement
tracing:
  enabled: true
  provider: "opentelemetry"  # opentelemetry | jaeger | zipkin | none
  sampling_rate: 1.0  # 0.0 to 1.0
  exporters:
    - type: "otlp"
      endpoint: "http://localhost:4317"
    - type: "jaeger"
      endpoint: "http://localhost:14268/api/traces"
  propagation: "w3c"  # w3c | b3 | jaeger
  span_hierarchy: "session_lifecycle"  # ITEM-OBS-001: Enables session/gate/batch hierarchy
  # Span hierarchy structure:
  # session_span
  #   ├── init_span
  #   ├── discovery_span
  #   │     └── tool_scan_spans
  #   ├── analysis_span
  #   ├── planning_span
  #   │     └── dag_build_span
  #   ├── execution_span
  #   │     └── gate_spans
  #   │           └── batch_spans
  #   └── delivery_span

# ITEM-OBS-07: Structured Logging Format
structured_logging:
  enabled: true
  format: "json"  # json | text
  output: "stdout"  # stdout | file | both
  file_path: "logs/titan.log"
  component_levels:
    eventbus: "INFO"
    gates: "DEBUG"
    llm: "WARN"
    storage: "INFO"
  include_fields:
    - timestamp
    - level
    - message
    - component
    - session_id
    - trace_id

# ITEM-AGENT-01: Multi-Agent Orchestrator
multi_agent:
  enabled: true
  max_agents: 10
  task_queue:
    max_size: 1000
    priority_levels: 5
  heartbeat:
    interval_seconds: 30
    timeout_seconds: 120
  conflict_resolution:
    strategy: "weighted_vote"  # weighted_vote | first | consensus

# ITEM-FEAT-74: Chunk Dependency Graph for Recovery
chunk_dependency:
  enabled: true
  partial_recovery:
    enabled: true
    max_retry_chunks: 10
  dependency_tracking: true
  checkpoint_integration: true

# ITEM-FEAT-103: titan-doctor Diagnostic Rules Engine
doctor:
  enabled: true
  rules_path: "diagnostics/rules.yaml"
  auto_fix_enabled: false  # Require explicit --fix flag
  severity_threshold: "WARN"  # Minimum severity to report
  rules:
    - id: "PROTOCOL_VERSION_MISMATCH"
      enabled: true
    - id: "ORPHANED_CHECKPOINT"
      enabled: true
      auto_fix: true
    - id: "STALE_LOCK_FILE"
      enabled: true
      auto_fix: true
    - id: "EVENTBUS_DLQ_FULL"
      enabled: true
      auto_fix: true

# ITEM-PROD-01: SARIF Output Format
sarif:
  enabled: true
  output_path: "results.sarif"
  include_suppressed: false
  schema_version: "2.1.0"

# ITEM-PROD-02: Interactive Mode
interactive:
  enabled: false  # Enable for debugging sessions
  prompt: "titan> "
  history_file: ".titan/repl_history"
  auto_pause_on:
    - "GATE_FAIL"
    - "CLARITY_LOW"
  max_history: 1000

# ITEM-PERF-01: Streaming Response Support
streaming:
  enabled: true
  chunk_callback: true
  max_stream_time_seconds: 300
  early_termination_on_gate_fail: true
  buffer_size: 4096

# ========================================
# v4.1.0 Configuration Additions (TIER_7 - PHASE_30)
# ========================================

# ITEM-DAG-112: CycleDetector in PlanningEngine
planning:
  cycle_detection:
    enabled: true
    check_before_iteration: true
    check_on_amendment: true
    emit_events: true
    halt_on_cycle: true

# ITEM-DAG-114: Root Model Plan Amendment Control
amendment_control:
  enabled: true
  auto_approve: false  # Security: require explicit approval
  require_gate_validation: true
  audit_enabled: true
  max_pending_requests: 100
  protected_fields:
    - execution_order
    - dependencies
    - batches
    - keep_veto_markers
    - critical_path

# ========================================
# v4.1.0 Configuration Additions (TIER_7 - PHASE_27-33)
# ========================================

# ITEM-VAL-65: Sandbox Health Check
sandbox:
  health_check: true
  check_interval_seconds: 60
  unhealthy_action: "block"  # block | warn | allow
  health_check_cache_seconds: 60

# ITEM-SEC-122: Workspace Isolation Enforcement
workspace:
  enforcement: "strict"  # strict | permissive | disabled
  allowed_symlinks: false
  sandbox_to_workspace: true
  require_workspace_path: true

# ITEM-INT-102: CROSSREF_VALIDATOR
crossref:
  enabled: true
  run_post_gate04: true
  run_post_chunk: true
  broken_threshold: 0.05  # 5% broken refs triggers diagnostics
  validate_external: false
  check_images: true
  check_code_imports: true

# ITEM-OPS-79: Schema Migration Framework
schema_migration:
  enabled: true
  auto_apply: true
  migrations_dir: "src/schema/migrations"
  backup_before_migrate: true
  validate_after_migrate: true

# ITEM-VAL-001: TieredValidatorSampling Enhancement
# ITEM-VAL-69: Validation Tiering by Severity
validation_tiering:
  enabled: true
  # Legacy thresholds format (backward compatible)
  thresholds:
    sev1_sev2: 1.0  # Always run
    sev3_large_file_threshold: 50000
    sev3_sampling_rate: 0.5
    sev4_sampling_rate: 0.2
  # ITEM-VAL-001: New sampling configuration
  sampling:
    sev3_large_file_threshold: 50000  # bytes
    sev3_large_file_rate: 0.5
    sev4_small_file_threshold: 10000  # bytes
    sev4_small_file_rate: 1.0
    sev4_large_file_rate: 0.2
    critical_content_types:
      - config
      - schema
      - manifest
    critical_content_multiplier: 1.5

# ITEM-OBS-81: Real-time p50/p95 Export
realtime_metrics:
  enabled: true
  export_interval_seconds: 30
  window_size: 100
  include:
    - token_count_p50
    - token_count_p95
    - latency_p50
    - latency_p95

# ITEM-OBS-85: Token Attribution per Gate
token_attribution:
  enabled: true
  track_per_gate: true
  include_in_metrics: true

# ITEM-RES-113: Leaf Agent Heartbeat
leaf_heartbeat:
  enabled: true
  timeout_seconds: 120
  on_timeout: "replan"  # replan | abort | warn

# ITEM-RES-143: DeterministicSeed Injection
deterministic_seed:
  enforce: true
  require_temperature_zero: true
  inject_on_all_calls: true

# ITEM-PROT-001: Hyperparameter Enforcement Gate
hyperparameters:
  enforcement: strict  # Options: strict, relaxed
  on_violation: reject  # Options: reject, warn, auto_fix
  allowed_temperature: 0.0  # Required temperature in strict mode
  max_top_p: 0.1  # Maximum allowed top_p in strict mode
  require_seed: true  # Whether seed is required

# ========================================
# v5.0.0 Configuration Additions
# ========================================

# ITEM-GAP-002: ABI_LOCKED_PROTOCOL
abi_locked:
  enabled: true
  clusters_path: .titan/abi_clusters.json
  auto_detect: true
  rollback_on_failure: true
  # Known ABI-sensitive packages (extended at runtime)
  abi_sensitive_packages:
    - numpy
    - pandas
    - scipy
    - numba
    - tensorflow
    - torch
    - cupy
    - arrow
    - pyarrow
    - h5py
  # Cascade dependency mappings
  cascade_dependencies:
    numpy:
      - pandas
      - scipy
      - numba
      - matplotlib
      - sklearn
    torch:
      - torchvision
      - torchaudio
      - transformers
    tensorflow:
      - tensorflow-hub
      - tensorflow-datasets

# ========================================
# v5.0.0 Context Adaptation Configuration
# ========================================

# ITEM-CTX-001: ProfileRouter Enhancement
context_adaptation:
  enabled: true
  auto_detect: true
  default_profile: single_llm_executor
  profiles:
    ci_cd_pipeline:
      retain: [validation, security, output]
      modify:
        gate_sensitivity:
          deterministic:
            fail_on_any_gap: true
        mode:
          current: ci_cd_pipeline
          strict_mode: true
          fail_fast: true
      remove: [interactive, approval]
    multi_agent_swarm:
      retain: [multi_agent, coordination, decision]
      modify:
        gate_sensitivity:
          multi_agent_swarm:
            consensus_required: true
        mode:
          current: multi_agent_swarm
      remove: []
    human_in_the_loop:
      retain: [interactive, approval, feedback]
      modify:
        mode:
          current: guided_autonomy
        interactive:
          enabled: true
      remove: []
    resource_constrained:
      retain: [validation, output]
      modify:
        chunking:
          default_size: 500
        validation_tiering:
          sev3_large_file_rate: 0.3
      remove: [observability, tracing]
    real_time_streaming:
      retain: [streaming, output]
      modify:
        streaming:
          enabled: true
          early_termination_on_gate_fail: true
      remove: [interactive, approval]
    non_code_domain:
      retain: [validation, output]
      modify:
        scoring:
          adaptive_weights:
            default_profile: narrative
      remove: [sandbox, dependency_resolution]
    small_scripts_lt1k:
      retain: [validation]
      modify:
        chunking:
          default_size: 1500
      remove: [multi_file, dependency_resolution]
    repo_bootstrap:
      retain: [navigation, discovery]
      modify:
        mode:
          current: repo_bootstrap
      remove: [execution]
    single_llm_executor:
      retain: [validation, output, checkpoint]
      modify:
        gate_sensitivity:
          deterministic:
            fail_on_any_gap: false
      remove: [multi_agent]

# ========================================
# v1.2.0 Configuration Additions (PHASE_1)
# ========================================

# ITEM-005: Profile Detection (Self-Awareness Engine)
self_awareness:
  enabled: true
  profile_detection:
    # Detection method weights
    weights:
      lexical_analysis: 0.4
      pattern_matching: 0.3
      history_analysis: 0.2
      explicit_signal: 0.1
    # Cache settings
    cache:
      enabled: true
      max_size: 1000
      ttl_seconds: 3600
      strategy: "lru"
    # Localization support (currently disabled)
    localization:
      enabled: false
      supported_languages: ["en"]
    # Fallback profile when detection fails
    fallback_profile: "developer"
    # Minimum confidence to accept detection
    min_confidence: 0.5
  # User role profiles (different from execution profiles)
  user_roles:
    - designer
    - developer
    - analyst
    - devops
    - researcher

# ITEM-008: Universal Router Configuration
universal_router:
  enabled: true
  # Main entry point configuration
  routing:
    # Profile detection timeout
    profile_detection_timeout_ms: 500
    # Intent enrichment timeout
    intent_enrichment_timeout_ms: 1000
    # End-to-end routing timeout
    total_timeout_ms: 2000
    # Fallback behavior
    fallback:
      enabled: true
      max_fallback_depth: 3
      default_skill: "general_assistant"
  # Chain composition settings
  chain_composition:
    max_chain_length: 10
    parallel_execution: true
    max_parallel_skills: 5
    gate_validation: true
  # Performance targets
  performance:
    p50_latency_ms: 300
    p99_latency_ms: 500
    timeout_ms: 2000

# ITEM-010: Skill Graph Configuration
skill_graph:
  enabled: true
  # Graph building settings
  graph:
    max_depth: 5
    max_nodes: 100
    cycle_detection: true
  # Synergy tracking
  synergy:
    enabled: true
    min_co_occurrence: 3
    min_success_rate: 0.7
  # Skill selection
  selection:
    max_candidates: 5
    min_relevance_score: 0.5
    diversity_factor: 0.3

# ITEM-007: Session Memory Configuration
session_memory:
  enabled: true
  # Storage settings
  storage:
    backend: "local"  # local | redis | s3
    max_size_mb: 100
    encryption: "aes-256-gcm"
    compression: true
  # Session settings
  session:
    default_ttl_seconds: 86400  # 24 hours
    max_sessions_per_user: 10
    cleanup_interval_seconds: 3600
  # Migration support
  migration:
    enabled: true
    backup_before_migrate: true
    supported_versions: ["1.0.0", "1.1.0", "1.2.0"]
  # History tracking
  history:
    max_entries: 1000
    pattern_detection: true
    pattern_min_occurrences: 3

# ITEM-009: Tool Activation Matrix (already exists in config/tool_activation.yaml)
# This section provides override capabilities
tool_activation:
  config_path: "config/tool_activation.yaml"
  hot_reload: true
  reload_interval_seconds: 60

# Performance Monitoring Targets
performance_targets:
  # Profile detection SLA
  profile_detection:
    p50_latency_ms: 50
    p99_latency_ms: 100
    timeout_ms: 500
  # Intent enrichment SLA
  intent_enrichment:
    p50_latency_ms: 100
    p99_latency_ms: 200
    timeout_ms: 1000
  # Session memory operations SLA
  session_memory:
    read_latency_ms: 25
    write_latency_ms: 50
    timeout_ms: 200
  # End-to-end routing SLA
  routing:
    p50_latency_ms: 300
    p99_latency_ms: 500
    timeout_ms: 2000

# Monitoring Endpoints
monitoring:
  # Health check endpoint
  health:
    enabled: true
    path: "/health"
    port: 8080
  # Readiness probe
  readiness:
    enabled: true
    path: "/ready"
    port: 8080
  # Metrics endpoint
  metrics:
    enabled: true
    path: "/metrics"
    port: 9090
    format: "prometheus"
  # Debug endpoint (disabled by default)
  debug:
    enabled: false
    path: "/debug"
    port: 8080

# Resilience Configuration (PHASE_3)
resilience:
  # Circuit breaker settings
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    success_threshold: 3
    timeout_seconds: 60
    half_open_max_calls: 3
  # Retry settings
  retry:
    default_max_retries: 3
    default_backoff: "exponential"
    initial_delay_ms: 100
    max_delay_ms: 30000
    jitter: true
  # Degradation settings
  degradation:
    enabled: true
    levels:
      - name: "full"
        features: ["all"]
      - name: "reduced"
        features: ["core_routing", "basic_skills"]
        disabled: ["advanced_skills", "caching", "synergy_tracking"]
      - name: "minimal"
        features: ["core_routing"]
        disabled: ["advanced_skills", "caching", "synergy_tracking", "profile_detection", "intent_enrichment"]

# Security Configuration (PHASE_3)
security:
  # Input sanitization
  input_sanitization:
    enabled: true
    max_request_length: 10000
    prompt_injection_detection: true
    html_injection_detection: true
    control_character_removal: true
  # Session security
  session_security:
    enabled: true
    max_session_age_seconds: 86400
    session_id_rotation: true
    secure_cookies: true
  # Rate limiting
  rate_limiting:
    enabled: true
    requests_per_minute: 60
    requests_per_hour: 1000
    burst_size: 10
