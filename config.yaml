session:
  id: null
  max_tokens: 100000
  max_time_minutes: 60
  checkpoint_enabled: true
chunking:
  default_size: 1500
  large_file_size: 800
  min_size: 500
  semantic_boundaries: true
  boundary_markers:
  - '^#{1,6} '
  - '^function '
  - '^def '
  - '^class '
  - ^---$
  - ^```
llm_query:
  max_response_tokens: 2048
  max_chunk_tokens: 4000
  fallback_enabled: true
  fallback:
    max_attempts: 4
    size_reduction_factor: 0.5
    timeout_seconds: 30
    model_fallback: true
    models:
    - primary
    - alternative-1
validation:
  max_patch_iterations: 2
  parallel_safe_check: true
  gate_04:
    max_sev1_gaps: 0
    max_sev2_gaps: 2
    max_total_gap_pct: 20
checkpoint:
  enabled: true
  format_version: '2.0'
  chunk_checksums: true
  partial_resumption: true
  max_age_days: 30
  path: checkpoints/checkpoint.json
  interval_tokens: 5000
  interval_seconds: 60
  # ITEM-073: Default serialization format
  serialization: json_zstd
  compression: zstd
  security: safe
  # ITEM-SEC-03: Checkpoint encryption
  encryption: aes-256-gcm
  encryption_key_path: .titan/encryption_key
  # ITEM-STOR-02: Checkpoint session isolation
  namespace_isolation: true
  namespace: default
  auto_cleanup: true
  cleanup_interval_days: 7
output:
  directory: outputs/
  clean_mode: true
  full_merge: true
  full_merge_max_lines: 8000
  artifacts:
    index: true
    symbol_map: true
    change_log: true
    decision_record: false
    metrics: true
multi_file:
  default_limit: 3
  hard_limit: 10
  require_approval: true
  dependency_resolution: true
  max_dependency_depth: 5
  cross_file_patches: false
approval:
  mode: interactive
  callback:
    url: null
    timeout: 300
    retries: 3
metrics:
  enabled: true
  output_file: outputs/metrics.json
  # ITEM-OBS-03: Schema versioning
  schema_version: "3.4.0"
  migration_enabled: true
  prometheus:
    enabled: false
    port: 9090
  webhook:
    enabled: false
    url: null
    events:
    - session_complete
    - session_failed
    - gate_blocked
validators:
  auto_load: true
  timeout: 10
  disabled: []
  # ITEM-070: Sandbox for validators
  sandbox_enabled: true
  # ITEM-SEC-01: Sandbox type selection
  sandbox_type: subprocess  # Options: wasm, gvisor, subprocess, none
  sandbox_config:
    memory_limit_mb: 128
    timeout_ms: 10000
    max_output_size: 1048576
logging:
  level: info
  file: null
  timestamps: true
  include_session_id: true
repository:
  directories:
  - inputs
  - outputs
  - checkpoints
  - skills
  - scripts
  - examples
  required_files:
  - PROTOCOL.md
  - SKILL.md
  - README.md
  - VERSION
development:
  debug: false
  keep_intermediates: false
  dry_run: true  # FIXED: Default to true for safety (R-04 mitigation)
  verbose: false
security:
  execution_mode: trusted
  sandbox_type: none
  permitted_operations:
  - file_read
  - file_write
  - grep
  - sed
  blocked_operations:
  - rm_rf
  - sudo
  - chmod
  - chown
  max_input_file_size_mb: 100
  max_total_input_size_mb: 500
  # ITEM-115: Enable secret scanning
  secrets_scan: true
  secrets_baseline: .secrets.baseline
  fail_on_detection: true
  workspace_path: null
  redos_timeout_ms: 1000

# ITEM-SEC-03: Secret store configuration
secrets:
  backend: env  # Options: keyring, vault, env
  # Backend-specific config:
  # keyring:
  #   service_name: titan-protocol
  # vault:
  #   url: http://localhost:8200
  #   token: null  # Use VAULT_TOKEN env
  #   mount_point: secret
  # env:
  prefix: TITAN_SECRET_

# ITEM-SEC-05: Audit trail configuration
audit:
  enabled: true
  signing_key_path: .titan/audit_key
  trail_path: .titan/audit_trail.json
  sign_critical_events: true

chunking_limits:
  max_chars_per_chunk: 150000
  max_tokens_per_chunk: 30000
  enforce_secondary_limits: true
policy:
  max_recursion_depth: 3
  # v3.6.0: ITEM-POLICY-01: PolicyResolver
  resolver:
    enabled: true
    strict_mode: false  # Block on conflicts if true
    allowed_conflict_severities:
      - "WARN"
      - "INFO"
    auto_resolve: false  # Auto-resolve trivial conflicts

# ITEM-ARCH-10: PolicyStagingZone
staging_zone:
  min_confidence: 0.6  # Minimum confidence to commit a staged policy
  max_staged: 100  # Maximum number of staged policies
  ttl_seconds: 3600  # Time-to-live for staged policies (1 hour)
  cleanup_interval_seconds: 300  # Automatic cleanup interval (5 minutes)

recursion:
  max_recursion_depth: 3
  track_peak: true
model_routing:
  root_model: ''  # REQUIRED: Set to your orchestration model ID
  leaf_model: ''  # REQUIRED: Set to your chunk processing model ID
  track_costs: true
  log_model_usage: true
  # FIXED: Validation added at startup (see src/cli/titan_cli.py)
  validation:
    require_root_model: false  # Set true to enforce model configuration
    require_leaf_model: false
    warn_on_empty: true
confidence:
  enable_advisory: true
  early_exit_threshold: HIGH
  require_acknowledgement: true
  log_confidence: true
telemetry:
  enable_token_tracking: true
  calculate_percentiles: true
  track_latency: true
  include_model_breakdown: true
mode:
  current: direct
  presets_dir: presets/
intent_classifier:
  enabled: false
  method: rule_based
  confidence_threshold: 0.7
  log_all: true
anomaly_detection:
  enabled: false
  baseline_sessions: 10
  threshold_multiplier: 3
  action: warn
model_fallback:
  enabled: false
  chain:
  - secondary-frontier
  - local-high-end
  degradation_mode: reduced_capability

# ITEM-GATE-05: Model downgrade control
model_downgrade_allowed: false  # Only true for fast_prototype mode

# ITEM-ARCH-02: Event Journal for crash recovery
event_journal:
  enabled: true
  path: .titan/event_journal.jsonl
  max_size_mb: 100

# ITEM-CONFLICT-J: EventBus Wildcard Performance
events:
  wildcard_warning_threshold: 10
  max_wildcard_handlers: 50
  # v3.6.0: ITEM-RESILIENCE-01: Dead Letter Queue
  dead_letter_queue:
    enabled: true
    max_size: 10000
    persistence: true
    storage_backend: "local"  # local | s3 | gcs
    retry_policy:
      max_retries: 3
      base_delay_ms: 1000
      exponential_backoff: true
    cleanup:
      max_age_hours: 72
      auto_purge: true
  sync_operations:
    default_timeout_ms: 5000
    max_timeout_ms: 30000

# ITEM-ARCH-03: Distributed Locking
locks:
  backend: file  # Options: file, redis, etcd
  lock_dir: .titan/locks
  # Redis backend config:
  redis:
    host: localhost
    port: 6379
    db: 0
    password: null
    key_prefix: "titan:lock:"
  # etcd backend config:
  etcd:
    host: localhost
    port: 2379
    key_prefix: "/titan/lock/"

# ITEM-ARCH-04: Gate-04 severity-based blocking
gate04:
  confidence_override: false  # HIGH confidence cannot override SEV-1/SEV-2
  max_sev2_gaps: 0  # Any unresolved SEV-2 blocks
  allow_advisory_pass: true  # Allow advisory pass for SEV-3/SEV-4

# ITEM-ARCH-07: Approval Loop configuration  
approval:
  release_locks_on_wait: true
  lock_ttl_seconds: 300
  force_resume_allowed: false  # Security: require cursor validation

# ITEM-GATE-02: Mode-based gate sensitivity
gate_sensitivity:
  deterministic:
    fail_on_any_gap: true
    warn_threshold_pct: 5
    max_sev1_gaps: 0
    max_sev2_gaps: 0
    max_sev3_gaps: 0
    max_sev4_gaps: 0
    allow_advisory_pass: false
    allow_unsafe: false
    confidence_override: false
  guided_autonomy:
    fail_on_any_gap: false
    warn_threshold_pct: 15
    max_sev1_gaps: 0
    max_sev2_gaps: 2
    max_sev3_gaps: 5
    max_sev4_gaps: 10
    allow_advisory_pass: true
    allow_unsafe: false
    confidence_override: true
  fast_prototype:
    fail_on_any_gap: false
    warn_threshold_pct: 30
    max_sev1_gaps: 0
    max_sev2_gaps: 5
    max_sev3_gaps: 10
    max_sev4_gaps: 20
    allow_advisory_pass: true
    allow_unsafe: true
    confidence_override: true

# ITEM-GATE-03: Pre-intent token budget
pre_intent:
  token_limit: 5000
  fallback_mode: MANUAL
  ambiguity_threshold: 0.5

# ITEM-STOR-01: Storage Backend Configuration
storage:
  backend: local  # Options: local, s3, gcs
  namespace: default  # Namespace for path isolation
  # Local filesystem configuration
  local:
    base_path: .titan/storage
    create_dirs: true
  # AWS S3 configuration (optional)
  s3:
    bucket: null  # Required if backend is s3
    prefix: titan
    region: us-east-1
    credentials:
      access_key: null  # Use AWS_ACCESS_KEY_ID env var
      secret_key: null  # Use AWS_SECRET_ACCESS_KEY env var
      session_token: null
    endpoint_url: null  # For S3-compatible services
  # Google Cloud Storage configuration (optional)
  gcs:
    bucket: null  # Required if backend is gcs
    prefix: titan
    project: null  # GCP project ID
    credentials_path: null  # Path to service account JSON

# ========================================
# v3.4.0 Configuration Additions
# ========================================

# ITEM-ARCH-09: Causal Event Ordering
causal_ordering:
  enabled: true
  node_id: null  # Auto-generated if null
  known_nodes: []  # List of known node IDs for vector clock

# ITEM-ARCH-15: Model Version Fingerprint
llm:
  strict_version_check: false  # Raise error on model version mismatch in deterministic mode
  version_tracking:
    enabled: true
    warn_only: false  # If true, just warn instead of blocking on mismatch

# ITEM-ARCH-19: Semantic Tainting
tainting:
  enabled: true
  confidence_threshold: 0.8  # Below this, data is auto-tainted

# ITEM-CFG-04: Runtime Config Overlay
runtime_overlay:
  enabled: true
  export_on_exit: true
  export_path: outputs/evals.jsonl

# ITEM-CFG-05: Manifest Cache Invalidation
manifest:
  cache_ttl_seconds: 300  # TTL for idle cache entries
  max_cache_entries: 100

# ITEM-CONFLICT-C: Chunk Size Bidirectional Optimization
chunking_optimization:
  min_chunk_size: 1000
  max_chunk_size: 50000
  shrink_threshold: 30000  # Files larger get smaller chunks
  grow_threshold: 5000  # Files smaller get larger chunks

# ITEM-CONFLICT-F: Model Fallback Trigger Conditions
model_fallback_triggers:
  timeout_ms: 30000
  error_rate_threshold: 0.1  # 10% errors in window
  error_rate_window_seconds: 60
  token_limit_exceeded: true

# ITEM-CONFLICT-K: Checksum Prefix Collision
checksum:
  prefix_length: 16  # For local/dev
  production_min_length: 32  # Required in production

# ITEM-CONFLICT-L: GraphViz Optional Dependency
visualization:
  mode: "ascii_only"  # "ascii_only" | "full"
  graphviz_path: null  # Optional path to dot

# ITEM-STOR-04: Log Rotation
logging_rotation:
  enabled: true
  max_size_mb: 100
  keep_count: 10
  compress: true
  max_age_days: 30

# ITEM-OBS-01: Prometheus Metrics Endpoint (extended)
prometheus:
  enabled: false
  port: 9090
  path: /metrics

# ITEM-FEAT-55: IntentRouter Plugin Registry
intent_router:
  plugins: []
  # Example plugin configuration:
  # - name: "code_audit"
  #   handler: "src.plugins.code_audit:handle"
  #   chain: ["security_scan", "style_check"]
  #   priority: 8
  # - name: "spec_generation"
  #   handler: "src.plugins.spec_gen:handle"
  #   chain: ["reference_collector", "doc_generator"]

# ITEM-FEAT-111: DAG Checkpointing
dag_checkpoint:
  enabled: true
  checkpoint_dir: .titan/dag_checkpoints
  max_snapshots: 100

# ========================================
# v3.5.1 Configuration Additions (Phase 14)
# ========================================

# ITEM-CAT-01: Adaptive Weight Profiles Engine
scoring:
  adaptive_weights:
    enabled: true
    default_profile: "mixed"  # Options: technical, medical_legal, narrative, mixed
    override_by_intent: true  # Allow intent_router to override profile
  thresholds:
    clear_winner: 2.0  # Gap for auto-select without rationale
    needs_rationale: 1.0  # Gap for one-sentence explanation
    conditional: 0.0  # Below this → conditional recommendation

# ITEM-CAT-02: SCOUT Roles Matrix Agent Framework
scout:
  roles:
    radar:
      enabled: true
      min_signal_threshold: 0.3
    devil:
      enabled: true
      mandatory_for: ["EVALUATE", "COMPARE", "VALIDATE", "AUDIT"]
    eval:
      enabled: true
      veto_enabled: true
      veto_on: ["EXPERIMENTAL", "VAPORWARE"]
    strat:
      enabled: true
      require_caveat_for: ["EXPERIMENTAL", "EARLY_ADOPTER"]
  pipeline:
    enforce_order: ["RADAR", "DEVIL", "EVAL", "STRAT"]
    allow_parallel: false  # Veto propagation requires sequential

# ITEM-CAT-03: Type-Aware Fusion Engine
fusion:
  type_aware:
    enabled: true
    strict_type_merge: true  # Block cross-type merges
    low_density_policy: "unique_context_or_caveat"  # Options: always, unique_context_or_caveat, never
  density:
    high_priority_multiplier: 1.5  # Boost HIGH_DENSITY in scoring
    low_density_threshold: 0.3  # Min relevance score to include LOW_DENSITY

# ITEM-CAT-04: Conflict Resolution Formula Engine
decision:
  conflict_resolution:
    enabled: true
    formula_weights:
      accuracy: 0.40
      utility: 0.35
      efficiency: 0.15
      consensus: 0.10
    thresholds:
      clear_winner: 2.0  # Auto-select, no rationale
      needs_rationale: 1.0  # Winner + one-sentence
      conditional: 0.0  # Below this → conditional recommendation
    override_by_domain: true  # Allow domain_profile to adjust weights

# ITEM-VAL-GUARDIAN: Guardian Validation Loop
guardian:
  enabled: true
  default_profile: "mixed"
  validation_mode: "standard"  # Options: strict, standard, permissive
  log_decisions: true
  conflict_detection: true
  auto_resolve: true

# ========================================
# v3.6.0 Configuration Additions (Phase 15-17)
# ========================================

# ITEM-FEEDBACK-01: FeedbackLoop
feedback:
  enabled: true
  min_samples_for_adjustment: 50
  adjustment_threshold: 0.05  # Minimum change to trigger
  max_allowed_degradation: 0.05  # 5%
  learning_rate: 0.1
  target_success_rate: 0.8
  catalog_versioning:
    enabled: true
    max_versions: 100
    retention_days: 365
  dry_run:
    enabled: true
    history_window_days: 30

# ITEM-FEEDBACK-02: SelfEvolutionEngine
evolution:
  enabled: true
  min_success_rate_for_pattern: 0.8
  min_sessions_for_pattern: 5
  auto_propose_skills: false  # Require human approval
  skill_draft_review: true

# ITEM-SKILL-01: SkillLibrary
skills:
  catalog_path: "skills/catalog.yaml"
  auto_register: true
  synergy_tracking: true
  min_applicable_to: 2  # Each skill applicable to >= 2 tasks
  validation:
    on_startup: true
    strict_mode: false

# ========================================
# v3.7.0 Configuration Additions (Phase 18)
# ========================================

# ITEM-ARCH-16: External State Drift Policy
state:
  drift_policy: "FAIL"  # FAIL | CLOBBER | MERGE | BRANCH
  drift_detection:
    enabled: true
    check_interval_seconds: 30
    on_drift:
      log_level: "WARN"
      emit_event: true
  merge_strategy:
    prefer: "local"  # local | external | newer
    conflict_resolution: "manual"  # manual | prefer_local | prefer_external

# ITEM-ARCH-18: Config Precedence Pyramid
config_precedence:
  log_overrides: true
  strict_mode: false  # Warn on conflicts if true
  sources:
    env_prefix: "TITAN_"
    cli_prefix: "--"
    constraints_file: "constraints.yaml"
    local_file: "config.yaml"
