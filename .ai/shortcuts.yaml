# TITAN FUSE Navigation Shortcuts

shortcuts:
  # Navigation shortcuts
  "start":
    description: "Begin protocol - read entry point"
    action: "read"
    files: ["AGENTS.md"]

  "config":
    description: "Read agent configuration"
    action: "read"
    files: ["SKILL.md", "config.yaml"]

  "protocol":
    description: "Read full protocol specification"
    action: "read"
    files: ["PROTOCOL.md"]

  # Processing shortcuts
  "process":
    description: "Process files in inputs/"
    action: "process"
    files: ["inputs/"]

  "resume":
    description: "Resume from checkpoint"
    action: "resume"
    files: ["checkpoints/checkpoint.json"]

  # Status shortcuts
  "status":
    description: "Check current session status"
    action: "query"
    returns: "STATE_SNAPSHOT"

  "gates":
    description: "Check gate status"
    action: "query"
    returns: "gates_passed"

  "budget":
    description: "Check token budget"
    action: "query"
    returns: "budget_used / budget_max"

  # Output shortcuts
  "output":
    description: "Navigate to outputs"
    action: "navigate"
    target: "outputs/"

  "artifacts":
    description: "List generated artifacts"
    action: "list"
    target: "outputs/"

  # Help shortcuts
  "help":
    description: "Show available shortcuts"
    action: "help"

  "version":
    description: "Show protocol version"
    action: "read"
    files: ["VERSION"]

# Command aliases
aliases:
  "go": "start"
  "init": "start"
  "run": "process"
  "check": "status"
  "metrics": "artifacts"
