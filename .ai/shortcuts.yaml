shortcuts:
  process_file:
    description: "Process a file from inputs/"
    action: "execute_pipeline"
    files:
      - "inputs/"
    steps:
      - "Read SKILL.md"
      - "Read PROTOCOL.md"
      - "Execute PHASE 0-5"

  resume_session:
    description: "Resume interrupted session"
    action: "restore_checkpoint"
    files:
      - "checkpoints/checkpoint.json"
    steps:
      - "Load checkpoint"
      - "Verify source_checksum"
      - "Continue from chunk_cursor"

  validate_output:
    description: "Run validation checks"
    action: "validate"
    files:
      - "outputs/"
    checks:
      - "GATE-04 threshold"
      - "CHANGE_LOG format"
      - "Artifact completeness"

  generate_metrics:
    description: "Export session metrics"
    action: "export"
    output: "outputs/metrics.json"
    format: "json"

  show_status:
    description: "Display current session status"
    action: "display"
    sections:
      - "STATE_SNAPSHOT"
      - "gates_passed"
      - "budget_used"
